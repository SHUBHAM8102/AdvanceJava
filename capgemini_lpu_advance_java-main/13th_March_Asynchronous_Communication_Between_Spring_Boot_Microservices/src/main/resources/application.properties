spring.application.name=recharge-service
server.port=8072

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

app.rabbitmq.queue-name=recharge.success
app.rabbitmq.exchange-name=recharge.exchange
app.rabbitmq.routing-key=recharge.key
app.rabbitmq.dlq-name=dlq.recharge
app.rabbitmq.dlq-exchange=dlq.exchange

app.jwt.secret=change-this-secret-key-change-this-secret-key
app.jwt.issuer=recharge-service

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
